<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #334155;
            background: #fdfbfb;
            font-weight: 400;
        }

        .site-header {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            color: #ffffff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
            z-index: 20;
            position: relative;
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            cursor: pointer;
        }

        .site-nav {
            display: flex;
            gap: 30px;
        }

        .site-nav a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .site-nav a:hover {
            color: #ffffff;
            transform: translateY(-1px);
        }

        .site-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .section-hero {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 80vh;
            padding: 40px 20px;
            overflow: hidden;
        }

        .section-testimonials {
            padding: 80px 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 48px;
            letter-spacing: -0.03em;
        }

        .reviews-grid {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .review-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-5px);
        }

        .review-text {
            font-size: 16px;
            line-height: 1.6;
            color: #475569;
            font-style: italic;
        }

        .review-author {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: auto;
        }

        .author-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #e2e8f0;
        }

        .author-info h4 {
            margin: 0;
            font-size: 16px;
            color: #1e293b;
            font-weight: 700;
        }

        .author-info p {
            margin: 4px 0 0;
            font-size: 14px;
            color: #64748b;
        }

        .site-footer {
            background: #f1f5f9;
            color: #64748b;
            text-align: center;
            padding: 24px;
            font-size: 14px;
            font-weight: 500;
            z-index: 20;
            position: relative;
            border-top: 1px solid #e2e8f0;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 60px 100px;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        h1 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            background: linear-gradient(135deg, #475569 0%, #1e293b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.02);
            animation: float 6s ease-in-out infinite;
            transition: opacity 0.4s ease-in-out;
        }

        .btn-next {
            margin-top: 36px;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #ffffff;
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            /* Primary: Light Green */
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
        }

        .btn-next:hover {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 0 14px 32px rgba(5, 150, 105, 0.5);
            background: linear-gradient(135deg, #059669 0%, #042f2e 100%);
            /* Secondary: Dark Green */
        }

        .btn-next:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Decorative background elements */
        .blob {
            position: absolute;
            filter: blur(90px);
            z-index: 1;
            opacity: 0.5;
            animation: pulse 12s alternate infinite;
        }

        .blob-1 {
            top: 10%;
            left: 20%;
            width: 450px;
            height: 450px;
            background: rgba(167, 243, 208, 0.5);
            /* Soft light green */
            border-radius: 50%;
        }

        .blob-2 {
            bottom: 10%;
            right: 15%;
            width: 550px;
            height: 550px;
            background: rgba(52, 211, 153, 0.3);
            /* Slightly darker green tone */
            border-radius: 50%;
            animation-delay: -6s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.1) translate(30px, -30px);
                opacity: 0.7;
            }
        }

        /* Responsive design (Mobile optimization) */
        @media (max-width: 768px) {
            .site-header {
                flex-direction: column;
                gap: 20px;
                padding: 24px 20px;
            }

            .site-nav {
                flex-direction: column;
                /* 메뉴 항목들도 세로로 쌓기 */
                width: 100%;
                gap: 16px;
                align-items: center;
            }

            .site-nav a {
                padding: 8px 0;
                width: 100%;
                text-align: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .site-nav a:last-child {
                border-bottom: none;
            }

            .container {
                padding: 40px 30px;
                width: 85%;
            }

            h1 {
                font-size: 28px;
            }

            .section-testimonials {
                padding: 40px 20px;
            }

            .review-card {
                min-width: 100%;
                /* 본문 후기 카드들이 자연스럽게 세로로 나열되도록 강제 */
            }
        }
    </style>
    <!-- Pretendard Korean Font for Excellent Readability -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>

<body>
    <header class="site-header">
        <div class="site-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            나의 첫 서비스
        </div>
        <nav class="site-nav">
            <a href="#">소개</a>
            <a href="#">기능</a>
            <a href="#">문의</a>
        </nav>
    </header>

    <main class="site-main">
        <!-- 첫 번째 섹션: 핵심 기능 (히어로 영역) -->
        <section class="section-hero">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="container">
                <h1 id="quote-text">오늘도 힘내세요!</h1>
                <button id="next-btn" class="btn-next">다음 문장 보기</button>
            </div>
        </section>

        <!-- 두 번째 섹션: 사용자 후기 -->
        <section class="section-testimonials">
            <h2 class="section-title">서비스 생생 후기</h2>
            <div class="reviews-grid">
                <div class="review-card">
                    <div class="review-text">"이 서비스 덕분에 매일 아침 큰 힘을 얻고 있습니다. 버튼을 누를 때마다 나오는 새로운 문구들이 지친 마음에 활력을 불어넣어 주네요.
                        개발자분 최고입니다!"</div>
                    <div class="review-author">
                        <img src="profile1.png" alt="김민준 사용자" class="author-img">
                        <div class="author-info">
                            <h4>김민준</h4>
                            <p>기획자, 일상 유저</p>
                        </div>
                    </div>
                </div>
                <div class="review-card">
                    <div class="review-text">"간결하면서도 꼭 필요한 핵심 경험만 제공해서 너무 좋습니다. UI 디자인이 고급스럽고 화면 반응도 매끄러워 계속 접속하고 싶어지는
                        서비스예요."</div>
                    <div class="review-author">
                        <img src="profile2.png" alt="이지원 사용자" class="author-img">
                        <div class="author-info">
                            <h4>이지원</h4>
                            <p>UX/UI 디자이너</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        &copy; 2026 ODYSSEY Service
    </footer>

    <script>
        const quotes = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        const quoteElement = document.getElementById('quote-text');
        const nextBtn = document.getElementById('next-btn');
        let currentIndex = 0;

        nextBtn.addEventListener('click', () => {
            // 부드러운 전환을 위해 투명도를 0으로 만듦
            quoteElement.style.opacity = 0;

            // CSS transition 시간이 지난 후 텍스트를 변경하고 다시 나타나게 함
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                quoteElement.textContent = quotes[currentIndex];
                quoteElement.style.opacity = 1;
            }, 400);
        });
    </script>
</body>

</html>
