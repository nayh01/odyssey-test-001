<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #334155;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 60px 100px;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        h1 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            background: linear-gradient(135deg, #475569 0%, #1e293b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.02);
            animation: float 6s ease-in-out infinite;
            transition: opacity 0.4s ease-in-out;
        }

        .btn-next {
            margin-top: 36px;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--btn-color, #ffffff);
            background: var(--btn-bg, linear-gradient(135deg, #10b981 0%, #059669 100%));
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: var(--btn-shadow, 0 8px 24px rgba(16, 185, 129, 0.3));
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
        }

        .btn-next:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--btn-shadow-hover, 0 12px 28px rgba(16, 185, 129, 0.5));
            background: var(--btn-bg-hover, linear-gradient(135deg, #34d399 0%, #059669 100%));
        }

        .btn-next:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: var(--btn-shadow-active, 0 4px 12px rgba(16, 185, 129, 0.3));
        }

        /* Color Themes for the Button */
        .theme-green {
            --btn-color: #ffffff;
            --btn-bg: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --btn-bg-hover: linear-gradient(135deg, #34d399 0%, #059669 100%);
            --btn-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            --btn-shadow-hover: 0 12px 28px rgba(16, 185, 129, 0.5);
            --btn-shadow-active: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .theme-blue {
            --btn-color: #ffffff;
            --btn-bg: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --btn-bg-hover: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            --btn-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
            --btn-shadow-hover: 0 12px 28px rgba(59, 130, 246, 0.5);
            --btn-shadow-active: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .theme-yellow {
            --btn-color: #1a1a2e;
            --btn-bg: linear-gradient(135deg, #fde047 0%, #eab308 100%);
            --btn-bg-hover: linear-gradient(135deg, #fef08a 0%, #eab308 100%);
            --btn-shadow: 0 8px 24px rgba(234, 179, 8, 0.3);
            --btn-shadow-hover: 0 12px 28px rgba(234, 179, 8, 0.5);
            --btn-shadow-active: 0 4px 12px rgba(234, 179, 8, 0.3);
        }

        .theme-orange {
            --btn-color: #ffffff;
            --btn-bg: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            --btn-bg-hover: linear-gradient(135deg, #fb923c 0%, #ea580c 100%);
            --btn-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
            --btn-shadow-hover: 0 12px 28px rgba(249, 115, 22, 0.5);
            --btn-shadow-active: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        /* Decorative background elements */
        .blob {
            position: absolute;
            filter: blur(90px);
            z-index: 1;
            opacity: 0.5;
            animation: pulse 12s alternate infinite;
        }

        .blob-1 {
            top: 10%;
            left: 20%;
            width: 450px;
            height: 450px;
            background: rgba(147, 197, 253, 0.5);
            /* Soft blue */
            border-radius: 50%;
        }

        .blob-2 {
            bottom: 10%;
            right: 15%;
            width: 550px;
            height: 550px;
            background: rgba(253, 164, 175, 0.4);
            /* Soft rose */
            border-radius: 50%;
            animation-delay: -6s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.1) translate(30px, -30px);
                opacity: 0.7;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 40px 60px;
            }

            h1 {
                font-size: 32px;
            }
        }
    </style>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container">
        <h1 id="quote-text">오늘도 힘내세요!</h1>
        <button id="next-btn" class="btn-next theme-green">다음 문장 보기</button>
    </div>

    <script>
        const quotes = [
            { text: "오늘도 힘내세요!", theme: "theme-green" },
            { text: "오늘도 해냈어요!", theme: "theme-blue" },
            { text: "조금씩 나아지고 있어요.", theme: "theme-yellow" },
            { text: "이대로 계속 가봅시다.", theme: "theme-orange" }
        ];

        const quoteElement = document.getElementById('quote-text');
        const nextBtn = document.getElementById('next-btn');
        let currentIndex = 0;

        nextBtn.addEventListener('click', () => {
            // 부드러운 전환을 위해 투명도를 0으로 만듦
            quoteElement.style.opacity = 0;

            // CSS transition 시간이 지난 후 텍스트를 변경하고 다시 나타나게 함
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                quoteElement.textContent = quotes[currentIndex].text;
                nextBtn.className = "btn-next " + quotes[currentIndex].theme;
                quoteElement.style.opacity = 1;
            }, 400);
        });
    </script>
</body>

</html>
